name: Acting Opportunity Finder

on:
  schedule:
    # 8am UTC = 9am London (BST, summer). In winter GMT = UTC so also 8am London.
    # Change to '0 7 * * *' in winter if you want 8am London year-round.
    - cron: '0 8 * * *'
  workflow_dispatch:
    inputs:
      skip_dedup:
        description: 'Send all matches even if seen before'
        type: boolean
        default: false

jobs:
  find-opportunities:
    runs-on: ubuntu-latest

    permissions:
      contents: write  # Needed to commit seen_opportunities.json

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run opportunity finder
        env:
          GMAIL_SENDER: rozemarijn.logtenberg15@gmail.com
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          if [ "${{ inputs.skip_dedup }}" = "true" ]; then
            python -m acting_opportunity_finder.main --all
          else
            python -m acting_opportunity_finder.main
          fi

      - name: Save seen opportunities
        run: |
          git config user.name "Acting Opportunity Finder"
          git config user.email "actions@github.com"
          git add acting_opportunity_finder/seen_opportunities.json
          git diff --staged --quiet || git commit -m "Update seen opportunities [skip ci]"
          git push
